<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find Mood</title>
  <link rel="stylesheet" href="MoodF.css" />
</head>
<body>
  <div class="modal-overlay">
    <div class="modal-card">
      <h2>Find Mood</h2>

      <div class="filter-row">
        <select id="cmbFilterField">
          <option value="Name">Name</option>
          <option value="Emoji">Emoji</option>
          <option value="Color">Color</option>
        </select>
        <input type="text" id="txtFilterValue" placeholder="Filter value..." />
        <button id="btnFind" class="btn-primary">Find</button>
        <button id="btnRefresh" class="btn-secondary">Refresh</button>
      </div>

      <div id="moodList" class="mood-list">
        <!-- Items rendered dynamically -->
      </div>

      <div class="button-row">
        <button id="btnSelect" class="btn-primary" disabled>Select</button>
        <button id="btnCancel" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module" src="MoodF.js"></script>
</body>
</html>
