<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HabitTracker - Login</title>
  <link rel="stylesheet" href="Login.css" />
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">🌱</div>
      <h1>HabitTracker</h1>
      <p class="subtitle">Build better habits every day</p>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="txtEmail">Email</label>
          <input type="email" id="txtEmail" placeholder="Enter your email" />
        </div>

        <div class="field">
          <label for="txtPassword">Password</label>
          <input type="password" id="txtPassword" placeholder="Enter your password" />
        </div>

        <div class="remember-field">
          <input type="checkbox" id="chkRememberMe" />
          <label for="chkRememberMe">Remember me</label>
        </div>

        <div id="lblError" class="error-message hidden"></div>

        <button type="submit" id="btnLogin" class="btn-login">Login</button>
      </form>

      <div class="register-link">
        <span>Don't have an account?</span>
        <button id="btnRegister" class="btn-link">Create one</button>
      </div>
    </div>
  </div>

  <script type="module" src="Login.js"></script>
</body>
</html>
